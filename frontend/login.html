<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | CampusFind</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0e1a;
      --surface:#111827;
      --card:rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.08);
      --gold:#f0a500;
      --gold-soft:rgba(240,165,0,0.12);
      --text:#f0ede8;
      --muted:#8a8fa8;
      --teal:#0eb88a;
    }
    body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:0.35}
    .orb1{width:500px;height:500px;background:radial-gradient(circle,#f0a50022,transparent);top:-100px;right:-100px}
    .orb2{width:400px;height:400px;background:radial-gradient(circle,#0eb88a18,transparent);bottom:-80px;left:-80px}
    .grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:0.4}
    .wrap{width:100%;max-width:440px;padding:2rem;position:relative;z-index:1;animation:fadeUp 0.6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    .brand{text-align:center;margin-bottom:2.5rem}
    .brand-icon{width:52px;height:52px;background:var(--gold-soft);border:1px solid rgba(240,165,0,0.25);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;font-size:22px}
    .brand h1{font-family:'Playfair Display',serif;color:var(--text);font-size:28px;font-weight:700;letter-spacing:-0.5px}
    .brand h1 span{color:var(--gold);font-style:italic}
    .brand p{color:var(--muted);font-size:14px;margin-top:6px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;backdrop-filter:blur(20px)}
    .field{margin-bottom:1.2rem}
    .field label{display:block;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
    .field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all 0.2s}
    .field input:focus{border-color:rgba(240,165,0,0.5);background:rgba(240,165,0,0.04);box-shadow:0 0 0 3px rgba(240,165,0,0.08)}
    .field input::placeholder{color:#4a5068}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:48px}
    .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px}
    .btn-primary{width:100%;background:linear-gradient(135deg,#f0a500,#e08800);border:none;border-radius:10px;padding:13px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#0a0e1a;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;letter-spacing:0.3px}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(240,165,0,0.3)}
    .btn-primary:active{transform:translateY(0)}
    .divider{text-align:center;color:var(--muted);font-size:13px;margin:1.2rem 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
    .divider::before{left:0}.divider::after{right:0}
    .link-row{text-align:center;font-size:14px;color:var(--muted);margin-top:1.2rem}
    .link-row a{color:var(--gold);text-decoration:none;font-weight:500}
    .link-row a:hover{text-decoration:underline}
    #msg{font-size:13px;color:#f87171;text-align:center;margin-top:10px;min-height:18px}
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="grain"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🎓</div>
    <h1>Campus<span>Find</span></h1>
    <p>Lost & Found Portal · Vidyavardhaka College of Engineering</p>
  </div>
  <div class="card">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@college.edu">
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter your password">
        <button class="pw-toggle" onclick="togglePw('password',this)">👁</button>
      </div>
    </div>
    <button class="btn-primary" onclick="login()">Sign In</button>
    <p id="msg"></p>
    <div class="link-row">Don't have an account? <a href="register.html">Register here</a></div>
  </div>
</div>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
<script>
function togglePw(id,btn){
  const i=document.getElementById(id);
  i.type=i.type==='password'?'text':'password';
  btn.textContent=i.type==='password'?'👁':'🙈';
}
</script>
</body>
</html>
