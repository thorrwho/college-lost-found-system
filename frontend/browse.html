<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browse Items | CampusFind</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0e1a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--gold:#f0a500;--gold-soft:rgba(240,165,0,0.1);--text:#f0ede8;--muted:#8a8fa8;--teal:#0eb88a}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:0.4;z-index:0}
    nav{background:rgba(10,14,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
    .nav-brand{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
    .nav-brand span{color:var(--gold);font-style:italic}
    .nav-links{display:flex;gap:4px}
    .nav-link{color:var(--muted);font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;text-decoration:none;transition:all 0.2s;border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,0.05)}
    .nav-link.active{color:var(--gold);background:var(--gold-soft)}
    .btn-logout{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}
    .btn-logout:hover{color:var(--text)}
    .main{max-width:1200px;margin:0 auto;padding:2.5rem 2rem;position:relative;z-index:1}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:16px;flex-wrap:wrap}
    .page-title{font-family:'Playfair Display',serif;font-size:28px}
    .page-title em{color:var(--gold);font-style:italic}
    .search-bar{flex:1;max-width:380px;position:relative}
    .search-bar input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px 10px 40px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all 0.2s}
    .search-bar input:focus{border-color:rgba(240,165,0,0.4);box-shadow:0 0 0 3px rgba(240,165,0,0.08)}
    .search-bar input::placeholder{color:#4a5068}
    .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.4}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
    .filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
    .filter-chip:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
    .filter-chip.active{background:var(--gold-soft);border-color:rgba(240,165,0,0.3);color:var(--gold)}
    .type-toggle{display:flex;gap:8px;margin-bottom:2rem}
    .type-btn{padding:9px 20px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s}
    .type-btn.active{background:var(--gold-soft);border-color:rgba(240,165,0,0.3);color:var(--gold)}
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;animation:fadeUp 0.4s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .item-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.25s;cursor:pointer}
    .item-card:hover{border-color:rgba(240,165,0,0.25);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.4)}
    .item-img{height:150px;background:linear-gradient(135deg,rgba(240,165,0,0.06),rgba(14,184,138,0.06));display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
    .item-img img{width:100%;height:100%;object-fit:cover}
    .status-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase}
    .s-lost{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
    .s-found{background:rgba(14,184,138,0.12);color:var(--teal);border:1px solid rgba(14,184,138,0.2)}
    .item-body{padding:14px 16px}
    .item-name{font-weight:600;font-size:14px;margin-bottom:4px}
    .item-loc{font-size:12px;color:var(--muted);margin-bottom:10px}
    .item-loc::before{content:'📍';font-size:10px;margin-right:4px}
    .item-footer{display:flex;justify-content:space-between;align-items:center}
    .item-date{font-size:11px;color:#4a5068}
    .item-cat{font-size:11px;background:rgba(255,255,255,0.06);color:var(--muted);padding:3px 8px;border-radius:4px}
    .empty-state{text-align:center;padding:4rem;color:var(--muted);grid-column:1/-1}
    .empty-icon{font-size:48px;opacity:0.3;margin-bottom:12px}
    .loading{text-align:center;padding:3rem;color:var(--muted);grid-column:1/-1;font-size:14px}
  </style>
</head>
<body>
<div class="grain"></div>
<nav>
  <div class="nav-brand">Campus<span>Find</span></div>
  <div class="nav-links">
    <button class="nav-link" onclick="location.href='dashboard.html'">Report Item</button>
    <button class="nav-link" onclick="location.href='history.html'">My Reports</button>
    <button class="nav-link active">Browse All</button>
  </div>
  <button class="btn-logout" onclick="logout()">Sign Out</button>
</nav>

<div class="main">
  <div class="top-bar">
    <div class="page-title">Browse <em>All Items</em></div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search by name, location..." oninput="filterItems()">
    </div>
  </div>

  <div class="type-toggle">
    <button class="type-btn active" id="btn-all" onclick="setType('all',this)">All Items</button>
    <button class="type-btn" id="btn-lost" onclick="setType('lost',this)">Lost</button>
    <button class="type-btn" id="btn-found" onclick="setType('found',this)">Found</button>
  </div>

  <div class="filters">
    <button class="filter-chip active" onclick="setCategory('all',this)">All Categories</button>
    <button class="filter-chip" onclick="setCategory('Electronics',this)">Electronics</button>
    <button class="filter-chip" onclick="setCategory('Documents',this)">Documents</button>
    <button class="filter-chip" onclick="setCategory('Accessories',this)">Accessories</button>
    <button class="filter-chip" onclick="setCategory('Clothing',this)">Clothing</button>
    <button class="filter-chip" onclick="setCategory('Books',this)">Books</button>
  </div>

  <div class="items-grid" id="items-grid">
    <div class="loading">Loading items...</div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
const BASE = typeof BASE_URL !== 'undefined' ? BASE_URL : 'http://localhost:5000';
const token = localStorage.getItem('token');
let allItems = [];
let currentType = 'all';
let currentCat = 'all';

function logout(){localStorage.clear();window.location.href='login.html';}

function getCategoryEmoji(cat){
  const map={Electronics:'💻',Documents:'📄',Accessories:'👜',Clothing:'👕',Books:'📚',Other:'📦'};
  return map[cat]||'📦';
}

async function loadAll(){
  try{
    const [lostRes, foundRes] = await Promise.all([
      fetch(`${BASE}/api/lost`,{headers:{"Authorization":`Bearer ${token}`}}),
      fetch(`${BASE}/api/found`,{headers:{"Authorization":`Bearer ${token}`}})
    ]);
    const lost = (await lostRes.json()).map(i=>({...i,_type:'lost'}));
    const found = (await foundRes.json()).map(i=>({...i,_type:'found'}));
    allItems = [...lost, ...found].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    renderItems();
  }catch(e){
    document.getElementById('items-grid').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load items. Make sure you're logged in.</p></div>`;
  }
}

function setType(type, el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderItems();
}

function setCategory(cat, el){
  currentCat=cat;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderItems();
}

function filterItems(){renderItems();}

function renderItems(){
  const q = document.getElementById('search').value.toLowerCase();
  let items = allItems.filter(i=>{
    const matchType = currentType==='all' || i._type===currentType;
    const matchCat = currentCat==='all' || i.category===currentCat;
    const matchQ = !q || (i.title||'').toLowerCase().includes(q) || (i.location||'').toLowerCase().includes(q) || (i.description||'').toLowerCase().includes(q);
    return matchType && matchCat && matchQ;
  });

  const grid = document.getElementById('items-grid');
  if(!items.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>No items found</p></div>`;
    return;
  }
  grid.innerHTML = items.map(item=>`
    <div class="item-card">
      <div class="item-img">
        ${item.image?`<img src="${BASE}/uploads/${item.image}" alt="item">`:`<span>${getCategoryEmoji(item.category)}</span>`}
        <span class="status-badge s-${item._type}">${item._type}</span>
      </div>
      <div class="item-body">
        <div class="item-name">${item.title||item.category||'Item'}</div>
        <div class="item-loc">${item.location||'Location unknown'}</div>
        <div class="item-footer">
          <span class="item-cat">${item.category||'Other'}</span>
          <span class="item-date">${(item.dateLost||item.dateFound||'').substring(0,10)||'N/A'}</span>
        </div>
      </div>
    </div>`).join('');
}

loadAll();
</script>
</body>
</html>
