<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | CampusFind</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0e1a;--surface:#111827;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--gold:#f0a500;--gold-soft:rgba(240,165,0,0.12);--text:#f0ede8;--muted:#8a8fa8;--teal:#0eb88a}
    body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:2rem 0}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
    .orb1{width:500px;height:500px;background:radial-gradient(circle,#f0a50020,transparent);top:-100px;right:-100px}
    .orb2{width:400px;height:400px;background:radial-gradient(circle,#0eb88a15,transparent);bottom:-80px;left:-80px}
    .grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:0.4}
    .wrap{width:100%;max-width:460px;padding:2rem;position:relative;z-index:1;animation:fadeUp 0.6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    .brand{text-align:center;margin-bottom:2rem}
    .brand-icon{width:52px;height:52px;background:var(--gold-soft);border:1px solid rgba(240,165,0,0.25);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;font-size:22px}
    .brand h1{font-family:'Playfair Display',serif;color:var(--text);font-size:26px;font-weight:700}
    .brand h1 span{color:var(--gold);font-style:italic}
    .brand p{color:var(--muted);font-size:13px;margin-top:5px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;backdrop-filter:blur(20px)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .field{margin-bottom:1.1rem}
    .field label{display:block;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
    .field input,.field select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all 0.2s}
    .field select option{background:#1a2035;color:var(--text)}
    .field input:focus,.field select:focus{border-color:rgba(240,165,0,0.5);background:rgba(240,165,0,0.04);box-shadow:0 0 0 3px rgba(240,165,0,0.08)}
    .field input::placeholder{color:#4a5068}
    .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.2rem}
    .type-btn{padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s}
    .type-btn.active{background:var(--gold-soft);border-color:rgba(240,165,0,0.4);color:var(--gold)}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:44px}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px}
    .btn-primary{width:100%;background:linear-gradient(135deg,#f0a500,#e08800);border:none;border-radius:10px;padding:13px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#0a0e1a;cursor:pointer;transition:all 0.2s;margin-top:0.4rem}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(240,165,0,0.3)}
    .link-row{text-align:center;font-size:14px;color:var(--muted);margin-top:1.2rem}
    .link-row a{color:var(--gold);text-decoration:none;font-weight:500}
    #reg_msg{font-size:13px;color:#f87171;text-align:center;margin-top:10px;min-height:18px}
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="grain"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🎓</div>
    <h1>Campus<span>Find</span></h1>
    <p>Create your account to get started</p>
  </div>
  <div class="card">
    <div class="row2">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name">
      </div>
      <div class="field">
        <label>USN</label>
        <input type="text" id="USN" placeholder="4VV23CI000">
      </div>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@college.edu">
    </div>
    <div class="field">
      <label>Role</label>
      <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher / Staff</option>
      </select>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Create a strong password">
        <button class="pw-toggle" onclick="togglePw()">👁</button>
      </div>
    </div>
    <button class="btn-primary" onclick="registerUser()">Create Account</button>
    <p id="reg_msg"></p>
    <div class="link-row">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
<script>
function togglePw(){
  const i=document.getElementById('password');
  i.type=i.type==='password'?'text':'password';
}
</script>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
