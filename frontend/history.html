<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Reports | CampusFind</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0e1a;--surface:#111827;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--gold:#f0a500;--gold-soft:rgba(240,165,0,0.1);--text:#f0ede8;--muted:#8a8fa8;--teal:#0eb88a}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:0.4;z-index:0}
    nav{background:rgba(10,14,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
    .nav-brand{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
    .nav-brand span{color:var(--gold);font-style:italic}
    .nav-links{display:flex;gap:4px}
    .nav-link{color:var(--muted);font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;text-decoration:none;transition:all 0.2s;border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,0.05)}
    .nav-link.active{color:var(--gold);background:var(--gold-soft)}
    .btn-logout{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}
    .btn-logout:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
    .main{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;position:relative;z-index:1}
    .page-header{margin-bottom:2.5rem}
    .page-header h2{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:6px}
    .page-header h2 em{color:var(--gold);font-style:italic}
    .page-header p{color:var(--muted);font-size:14px}
    .section-label{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem}
    .section-label h3{font-family:'Playfair Display',serif;font-size:20px}
    .section-label .count{background:var(--gold-soft);color:var(--gold);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid rgba(240,165,0,0.2)}
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:3rem;animation:fadeUp 0.4s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .item-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.25s}
    .item-card:hover{border-color:rgba(240,165,0,0.2);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.4)}
    .item-img{height:140px;background:linear-gradient(135deg,rgba(240,165,0,0.06),rgba(14,184,138,0.06));display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
    .item-img img{width:100%;height:100%;object-fit:cover}
    .status-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase}
    .s-pending{background:rgba(240,165,0,0.15);color:var(--gold);border:1px solid rgba(240,165,0,0.25)}
    .s-returned,.s-matched{background:rgba(14,184,138,0.15);color:var(--teal);border:1px solid rgba(14,184,138,0.25)}
    .s-lost{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
    .item-body{padding:14px 16px}
    .item-name{font-weight:600;font-size:14px;margin-bottom:4px}
    .item-loc{font-size:12px;color:var(--muted);margin-bottom:10px}
    .item-loc::before{content:'📍';font-size:10px;margin-right:4px}
    .item-footer{display:flex;justify-content:space-between;align-items:center}
    .item-date{font-size:11px;color:#4a5068}
    .view-btn{font-size:11px;color:var(--gold);font-weight:500;background:var(--gold-soft);border:1px solid rgba(240,165,0,0.2);padding:4px 10px;border-radius:6px;cursor:pointer;text-decoration:none;transition:all 0.2s;border:none;font-family:'Outfit',sans-serif}
    .view-btn:hover{background:rgba(240,165,0,0.2)}
    .empty-state{text-align:center;padding:3rem;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:2rem}
    .empty-icon{font-size:40px;opacity:0.3;margin-bottom:10px}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#111827;border:1px solid var(--border);border-radius:20px;padding:1.5rem;max-width:480px;width:90%;animation:fadeUp 0.3s ease both}
    .modal img{width:100%;border-radius:12px;margin-bottom:1rem;max-height:300px;object-fit:contain;background:#0a0e1a}
    .modal-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.08);border:none;color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px}
    .modal-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:6px}
    .modal-detail{font-size:13px;color:var(--muted);line-height:1.8}
    .modal-detail strong{color:var(--text)}
  </style>
</head>
<body>
<div class="grain"></div>
<nav>
  <div class="nav-brand">Campus<span>Find</span></div>
  <div class="nav-links">
    <button class="nav-link" onclick="location.href='dashboard.html'">Report Item</button>
    <button class="nav-link active">My Reports</button>
    <button class="nav-link" onclick="location.href='browse.html'">Browse All</button>
  </div>
  <button class="btn-logout" onclick="logout()">Sign Out</button>
</nav>

<div class="main">
  <div class="page-header">
    <h2>My <em>Reports</em></h2>
    <p>Track all items you've reported as lost or found</p>
  </div>

  <div class="section-label">
    <h3>Lost Items</h3>
    <span class="count" id="lost-count">0 items</span>
  </div>
  <div id="lost-grid" class="items-grid"></div>

  <div class="section-label">
    <h3>Found Items</h3>
    <span class="count" id="found-count">0 items</span>
  </div>
  <div id="found-grid" class="items-grid"></div>
</div>

<!-- Image Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <img id="modal-img" src="" alt="Item Image">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-detail" id="modal-detail"></div>
  </div>
</div>

<script src="js/common.js"></script>

<script>
const BASE_URL_HIST = typeof BASE_URL !== 'undefined' ? BASE_URL : 'http://localhost:5000';
const token = localStorage.getItem('token');

function logout(){localStorage.clear();window.location.href='login.html';}

function getCategoryEmoji(cat){
  const map={Electronics:'💻',Documents:'📄',Accessories:'👜',Clothing:'👕',Books:'📚',Other:'📦'};
  return map[cat]||'📦';
}

async function loadLost(){
  try{
    const res=await fetch(`${BASE_URL_HIST}/api/lost/my`,{headers:{"Authorization":`Bearer ${token}`}});
    const data=await res.json();
    const grid=document.getElementById('lost-grid');
    document.getElementById('lost-count').textContent=`${data.length} item${data.length!==1?'s':''}`;
    if(!data.length){grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>No lost items reported yet</p></div>`;return;}
    grid.innerHTML=data.map(item=>`
      <div class="item-card">
        <div class="item-img">
          ${item.image?`<img src="${BASE_URL_HIST}/uploads/${item.image}" alt="item">`:`<span>${getCategoryEmoji(item.category)}</span>`}
          <span class="status-badge s-${item.status||'pending'}">${item.status||'pending'}</span>
        </div>
        <div class="item-body">
          <div class="item-name">${item.title||item.category}</div>
          <div class="item-loc">${item.location||'Unknown'}</div>
          <div class="item-footer">
            <span class="item-date">${item.dateLost?item.dateLost.substring(0,10):'N/A'}</span>
            <button class="view-btn" onclick="showItem(${JSON.stringify(item).replace(/"/g,'&quot;')})">View →</button>
          </div>
        </div>
      </div>`).join('');
  }catch(e){document.getElementById('lost-grid').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load</p></div>`}
}

async function loadFound(){
  try{
    const res=await fetch(`${BASE_URL_HIST}/api/found/my`,{headers:{"Authorization":`Bearer ${token}`}});
    const data=await res.json();
    const grid=document.getElementById('found-grid');
    document.getElementById('found-count').textContent=`${data.length} item${data.length!==1?'s':''}`;
    if(!data.length){grid.innerHTML=`<div class="empty-state"><div class="empty-icon">📦</div><p>No found items reported yet</p></div>`;return;}
    grid.innerHTML=data.map(item=>`
      <div class="item-card">
        <div class="item-img">
          ${item.image?`<img src="${BASE_URL_HIST}/uploads/${item.image}" alt="item">`:`<span>${getCategoryEmoji(item.category)}</span>`}
          <span class="status-badge ${item.matchedWith?'s-matched':'s-pending'}">${item.matchedWith?'matched':'pending'}</span>
        </div>
        <div class="item-body">
          <div class="item-name">${item.title||item.category}</div>
          <div class="item-loc">${item.location||'Unknown'}</div>
          <div class="item-footer">
            <span class="item-date">${item.dateFound?item.dateFound.substring(0,10):'N/A'}</span>
            <button class="view-btn" onclick="showItem(${JSON.stringify(item).replace(/"/g,'&quot;')})">View →</button>
          </div>
        </div>
      </div>`).join('');
  }catch(e){document.getElementById('found-grid').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load</p></div>`}
}

function showItem(item){
  document.getElementById('modal-img').src = item.image?`${BASE_URL_HIST}/uploads/${item.image}`:'';
  document.getElementById('modal-img').style.display = item.image?'block':'none';
  document.getElementById('modal-title').textContent = item.title||item.category||'Item';
  document.getElementById('modal-detail').innerHTML = `
    <strong>Category:</strong> ${item.category||'N/A'}<br>
    <strong>Location:</strong> ${item.location||'N/A'}<br>
    <strong>Date:</strong> ${item.dateLost||item.dateFound||'N/A'}<br>
    <strong>Description:</strong> ${item.description||'No description'}<br>
    <strong>Status:</strong> ${item.status||'pending'}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e){
  if(e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

loadLost();
loadFound();
</script>
</body>
</html>
