<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusFind | Lost & Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0e1a;--gold:#f0a500;--text:#f0ede8;--muted:#8a8fa8;--border:rgba(255,255,255,0.08)}
    body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
    .orb1{width:600px;height:600px;background:radial-gradient(circle,#f0a50018,transparent);top:-150px;right:-150px}
    .orb2{width:500px;height:500px;background:radial-gradient(circle,#0eb88a12,transparent);bottom:-100px;left:-100px}
    .grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:0.4}
    .wrap{text-align:center;position:relative;z-index:1;padding:2rem;animation:fadeUp 0.8s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:none}}
    .icon{width:80px;height:80px;background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.2);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:2rem;animation:fadeUp 0.8s ease 0.1s both}
    h1{font-family:'Playfair Display',serif;font-size:52px;color:var(--text);line-height:1.1;margin-bottom:1rem;animation:fadeUp 0.8s ease 0.2s both}
    h1 em{color:var(--gold);font-style:italic}
    p{color:var(--muted);font-size:16px;max-width:440px;margin:0 auto 2.5rem;line-height:1.7;animation:fadeUp 0.8s ease 0.3s both}
    .btns{display:flex;gap:14px;justify-content:center;animation:fadeUp 0.8s ease 0.4s both}
    .btn-gold{background:linear-gradient(135deg,#f0a500,#e08800);border:none;border-radius:12px;padding:14px 32px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#0a0e1a;cursor:pointer;transition:all 0.2s;text-decoration:none}
    .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,165,0,0.3)}
    .btn-outline{background:transparent;border:1px solid var(--border);border-radius:12px;padding:14px 32px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.2s;text-decoration:none}
    .btn-outline:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04)}
    .stats{display:flex;gap:3rem;justify-content:center;margin-top:4rem;animation:fadeUp 0.8s ease 0.5s both}
    .stat{text-align:center}
    .stat-num{font-family:'Playfair Display',serif;font-size:32px;color:var(--text)}
    .stat-label{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
    .divider{width:1px;background:var(--border);align-self:stretch}
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="grain"></div>
<div class="wrap">
  <div class="icon">🎓</div>
  <h1>Campus<em>Find</em></h1>
  <p>The smart lost & found portal for KLE Technological University. Reuniting students with their belongings.</p>
  <div class="btns">
    <a href="login.html" class="btn-gold">Sign In</a>
    <a href="register.html" class="btn-outline">Create Account</a>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num">100+</div>
      <div class="stat-label">Items Reported</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-num">80+</div>
      <div class="stat-label">Items Reunited</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-num">500+</div>
      <div class="stat-label">Students</div>
    </div>
  </div>
</div>
</body>
</html>
